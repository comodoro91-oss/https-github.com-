<script>
(function(){
"use strict";

// ========== CONFIGURAÇÃO DOS ATIVOS ==========
const ASSETS = {
    gold:   { symbol: 'GC=F',  label: 'GOLD',    color: '#ffd700', decimals: 2, scale: 1 },
    sp500:  { symbol: '^GSPC', label: 'S&P 500', color: '#2196f3', decimals: 2, scale: 1 },
    dow:    { symbol: '^DJI',  label: 'DOW',     color: '#ff6b35', decimals: 2, scale: 1 },
    nasdaq: { symbol: '^IXIC', label: 'NASDAQ',  color: '#00c896', decimals: 2, scale: 1 }
};

const MAX_CREDITS = 10000;
const COST_PER_FETCH = 4;   // 4 ativos
const CANDLE_INTERVAL = '5m';  // 5 minutos
const MAX_CANDLES = 60;        // 5 horas

// Variáveis globais
let credits = 1000;
let isConnected = false;
let alertsEnabled = false;
let updateTimer = null;
let soundEnabled = true;
let signalLog = [];
let lastCandles = { gold:[], sp500:[], dow:[], nasdaq:[] }; // array de {open,high,low,close,volume}
let utBotStops = { gold:[], sp500:[], dow:[], nasdaq:[] };  // stops do UT Bot

// ========== GERENCIAMENTO DE CRÉDITOS ==========
function loadCredits() {
    try { const s = localStorage.getItem('elitev2_credits'); if(s) credits = parseInt(s)||1000; } catch(e){}
    updateCreditsUI();
}
function saveCredits() { try { localStorage.setItem('elitev2_credits', credits); } catch(e){} }
function updateCreditsUI() {
    const pct = Math.min((credits/MAX_CREDITS)*100, 100);
    document.getElementById('creditsCount').textContent = credits;
    document.getElementById('credBar').style.width = pct+'%';
    const st = document.getElementById('credStatus');
    if(credits <= 50) st.textContent = '⚠️ CRÍTICO';
    else if(credits <= 200) st.textContent = '⚡ Baixo';
    else st.textContent = '✅ OK';
    saveCredits();
}
window.addCredits = (n) => { credits = Math.min(credits+n, MAX_CREDITS); updateCreditsUI(); popup('💎 CRÉDITOS', `+${n} adicionados. Total: ${credits}`); };
window.resetCredits = () => { if(confirm('Resetar para 1000?')){ credits=1000; updateCreditsUI(); } };

// ========== CONEXÃO ==========
window.connectAPI = () => {
    if(isConnected) return popup('ℹ️','Já conectado.');
    if(credits < COST_PER_FETCH) return popup('❌','Créditos insuficientes!');
    isConnected = true;
    setConnStatus('connecting','🔄 CONECTANDO...');
    toggleIndicators('online');
    fetchAllData();
    updateTimer = setInterval(fetchAllData, 60000); // 1 minuto
    popup('🔌 CONECTADO','Atualizando a cada minuto.');
};

window.disconnectAPI = () => {
    if(!isConnected) return popup('ℹ️','Já desconectado.');
    isConnected = false;
    if(updateTimer) { clearInterval(updateTimer); updateTimer=null; }
    toggleIndicators('offline');
    setConnStatus('disconnected','⚫ DESCONECTADO');
    popup('🔴','API desconectada.');
};

function setConnStatus(type, msg) {
    const el = document.getElementById('connStatus');
    el.textContent = msg;
    el.className = 'conn-status ' + type;
}

function toggleIndicators(mode) {
    const assets = Object.keys(ASSETS);
    assets.forEach(k => {
        const ind = document.getElementById(`ind${capitalize(k)}`);
        if(!ind) return;
        if(mode === 'online') {
            ind.textContent = '● AO VIVO';
            ind.style.color = 'var(--accent)';
        } else {
            ind.textContent = '⚫ OFFLINE';
            ind.style.color = 'var(--danger)';
        }
    });
}

// ========== FETCH DE DADOS (CANDLES DE 5 MINUTOS) ==========
async function fetchCandles(symbol) {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=${CANDLE_INTERVAL}&range=5d`;
    // Se estiver rodando com servidor local, use:
    // const url = `/api/yahoo?symbol=${encodeURIComponent(symbol)}&interval=${CANDLE_INTERVAL}&range=5d`;
    // Deixando proxy automático para teste:
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    try {
        const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
        if(!resp.ok) throw new Error('HTTP '+resp.status);
        const outer = await resp.json();
        const data = JSON.parse(outer.contents);
        if(data.chart?.result?.[0]) {
            const result = data.chart.result[0];
            const meta = result.meta;
            const quote = result.indicators.quote[0];
            const timestamps = result.timestamp;
            if(!quote.open || !quote.high || !quote.low || !quote.close) return null;
            let candles = [];
            for(let i=0; i<timestamps.length; i++) {
                if(quote.open[i]===null || quote.high[i]===null || quote.low[i]===null || quote.close[i]===null) continue;
                candles.push({
                    open: quote.open[i],
                    high: quote.high[i],
                    low: quote.low[i],
                    close: quote.close[i],
                    volume: quote.volume?.[i] || 0,
                    timestamp: timestamps[i] * 1000
                });
            }
            if(candles.length < 2) return null;
            return { candles, meta };
        }
    } catch(e) {
        console.error('Falha fetch', symbol, e);
        return null;
    }
    return null;
}

async function fetchAllData() {
    if(!isConnected) return;
    if(credits < COST_PER_FETCH) {
        popup('❌ CRÉDITOS','Insuficientes! Adicione mais.');
        disconnectAPI(); return;
    }
    const keys = Object.keys(ASSETS);
    const results = await Promise.all(keys.map(k => fetchCandles(ASSETS[k].symbol)));
    credits -= COST_PER_FETCH;
    updateCreditsUI();
    let anySuccess = false;
    keys.forEach((k,i) => {
        if(results[i] && results[i].candles.length >= 2) {
            anySuccess = true;
            lastCandles[k] = results[i].candles.slice(-MAX_CANDLES);
            updateIndicators(k);
            drawCandlestickChart(k);
        }
    });
    if(anySuccess) {
        setConnStatus('connected','✅ CONECTADO');
        document.getElementById('lastUpdate').textContent = '🕐 '+new Date().toLocaleTimeString();
        updateBestMoment();
    }
}

// ========== INDICADORES (UT Bot, EMA) ==========
function calculateEMA(data, period) {
    if(data.length === 0) return [];
    const k = 2/(period+1);
    let ema = [data[0]];
    for(let i=1; i<data.length; i++) ema.push(data[i]*k + ema[i-1]*(1-k));
    return ema;
}

function calculateATR(candles, period=10) {
    if(candles.length < period+1) return [];
    let tr = [];
    for(let i=1; i<candles.length; i++) {
        const h = candles[i].high, l = candles[i].low, pc = candles[i-1].close;
        tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
    }
    let atr = [];
    atr.push(tr[0]);
    for(let i=1; i<tr.length; i++) atr.push((atr[i-1]*(period-1) + tr[i])/period);
    // Prepend para alinhar com índice do candle (primeiro candle sem ATR)
    return [0].concat(atr);
}

function calculateUTBot(candles, atrPeriod=10, multiplier=1) {
    if(candles.length < atrPeriod+1) return [];
    const atr = calculateATR(candles, atrPeriod);
    let longStop = [];
    let shortStop = [];
    let buy = [];
    let sell = [];
    // Inicialização
    longStop.push(candles[0].close - atr[0]*multiplier);
    shortStop.push(candles[0].close + atr[0]*multiplier);
    let ut = 'neutral';
    for(let i=1; i<candles.length; i++) {
        const prevClose = candles[i-1].close;
        const currClose = candles[i].close;
        const atrVal = atr[i] || 0;
        // Long stop
        let nLoss = currClose - atrVal * multiplier;
        let prevLong = longStop[i-1];
        if(currClose > prevLong) longStop.push(Math.max(prevLong, nLoss));
        else longStop.push(nLoss);
        // Short stop
        nLoss = currClose + atrVal * multiplier;
        let prevShort = shortStop[i-1];
        if(currClose < prevShort) shortStop.push(Math.min(prevShort, nLoss));
        else shortStop.push(nLoss);
        // Sinais cruzando o stop no fechamento
        if(prevClose < longStop[i-1] && currClose > longStop[i]) buy.push(i);
        else if(prevClose > shortStop[i-1] && currClose < shortStop[i]) sell.push(i);
    }
    return { longStop, shortStop, buy, sell };
}

function updateIndicators(key) {
    const candles = lastCandles[key];
    if(!candles || candles.length < 20) return;
    const closes = candles.map(c=>c.close);
    const ema32 = calculateEMA(closes, 32);
    const ema176 = calculateEMA(closes, 176);
    const ut = calculateUTBot(candles, 10, 1);
    // Armazenar stops e sinais
    utBotStops[key] = {
        longStop: ut.longStop,
        shortStop: ut.shortStop,
        buySignals: ut.buy,
        sellSignals: ut.sell
    };
    // Último sinal
    const lastIdx = candles.length-1;
    const lastStopLong = ut.longStop[lastIdx];
    const lastStopShort = ut.shortStop[lastIdx];
    const lastClose = candles[lastIdx].close;
    // Exibir no card (elementos serão criados dinamicamente)
    const card = document.getElementById(`card${capitalize(key)}`);
    if(!card) return;
    const utEl = card.querySelector('.ut-signal');
    const utPriceEl = card.querySelector('.ut-price');
    if(utEl && utPriceEl) {
        utPriceEl.textContent = `Stop: ${lastStopLong.toFixed(2)}`;
        if(ut.buy.includes(lastIdx)) utEl.innerHTML = 'UT: ▲ COMPRA';
        else if(ut.sell.includes(lastIdx)) utEl.innerHTML = 'UT: ▼ VENDA';
        else utEl.innerHTML = 'UT: ◈ NEUTRO';
        utEl.className = 'signal-badge ' + (ut.buy.includes(lastIdx)?'compra':ut.sell.includes(lastIdx)?'venda':'neutro');
    }
    // Log de sinais
    if(ut.buy.includes(lastIdx)) addSignal(key, 'COMPRA (UT)', candles[lastIdx].close, 'UT Bot cruzou stop long');
    if(ut.sell.includes(lastIdx)) addSignal(key, 'VENDA (UT)', candles[lastIdx].close, 'UT Bot cruzou stop short');
}

// ========== DESENHO DO GRÁFICO DE VELAS ==========
function drawCandlestickChart(key) {
    const canvas = document.getElementById(`chart${capitalize(key)}`);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.offsetWidth || 300;
    const H = canvas.offsetHeight || 120;
    canvas.width = W;
    canvas.height = H;
    const candles = lastCandles[key];
    if(!candles || candles.length < 2) {
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = 'rgba(90,112,144,0.5)';
        ctx.font = '10px Space Mono';
        ctx.textAlign = 'center';
        ctx.fillText('Aguardando dados...', W/2, H/2);
        return;
    }
    const ema32 = calculateEMA(candles.map(c=>c.close), 32);
    const ema176 = calculateEMA(candles.map(c=>c.close), 176);
    const ut = utBotStops[key] || { longStop:[], shortStop:[] };

    const pad = { t: 20, b: 20, l: 10, r: 10 };
    const cW = W - pad.l - pad.r;
    const cH = H - pad.t - pad.b;
    const min = Math.min(...candles.map(c=>c.low));
    const max = Math.max(...candles.map(c=>c.high));
    const range = max - min || 1;
    const toX = i => pad.l + (i/(candles.length-1)) * cW;
    const toY = v => pad.t + (1 - (v-min)/range) * cH;

    ctx.clearRect(0,0,W,H);
    // Grid horizontal
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 0.5;
    for(let i=0; i<5; i++) {
        const y = pad.t + (i/4)*cH;
        ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cW, y); ctx.stroke();
    }

    // Velas
    const candleWidth = Math.max(1, (cW/candles.length)*0.8);
    candles.forEach((candle, i) => {
        if(i===0) return;
        const x = toX(i);
        const isGreen = candle.close >= candle.open;
        const color = isGreen ? '#00e5b4' : '#ff3d5a';
        const bodyTop = toY(Math.max(candle.open, candle.close));
        const bodyBottom = toY(Math.min(candle.open, candle.close));
        const highY = toY(candle.high);
        const lowY = toY(candle.low);
        // Pavio
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, highY);
        ctx.lineTo(x, bodyTop);
        ctx.moveTo(x, bodyBottom);
        ctx.lineTo(x, lowY);
        ctx.stroke();
        // Corpo
        ctx.fillStyle = color;
        ctx.fillRect(x - candleWidth/2, bodyTop, candleWidth, Math.max(1, bodyBottom-bodyTop));
    });

    // EMA 32
    if(ema32.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = '#ff9f00';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3,3]);
        let started = false;
        for(let i=0; i<candles.length; i++) {
            if(i >= ema32.length) break;
            const x = toX(i), y = toY(ema32[i]);
            if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // EMA 176
    if(ema176.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = '#a855f7';
        ctx.lineWidth = 1.5;
        let started = false;
        for(let i=0; i<candles.length; i++) {
            if(i >= ema176.length) break;
            const x = toX(i), y = toY(ema176[i]);
            if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
        }
        ctx.stroke();
    }

    // UT Bot stops (trailing)
    if(ut.longStop && ut.longStop.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = '#00e5b4';
        ctx.lineWidth = 1;
        ctx.setLineDash([2,2]);
        let started = false;
        for(let i=0; i<candles.length; i++) {
            if(i >= ut.longStop.length) break;
            const x = toX(i), y = toY(ut.longStop[i]);
            if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
        }
        ctx.stroke();
    }
    if(ut.shortStop && ut.shortStop.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = '#ff3d5a';
        ctx.lineWidth = 1;
        ctx.setLineDash([2,2]);
        let started = false;
        for(let i=0; i<candles.length; i++) {
            if(i >= ut.shortStop.length) break;
            const x = toX(i), y = toY(ut.shortStop[i]);
            if(!started){ ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Labels das EMAs
    ctx.fillStyle = '#ff9f00'; ctx.font = '8px Orbitron'; ctx.fillText('EMA32', W-50, 12);
    ctx.fillStyle = '#a855f7'; ctx.fillText('EMA176', W-50, 22);
}

// ========== MELHOR MOMENTO ==========
function updateBestMoment() {
    const keys = Object.keys(ASSETS);
    let buys = 0, sells = 0, momSum = 0, count = 0;
    keys.forEach(k => {
        const candles = lastCandles[k];
        if(!candles || candles.length < 10) return;
        const ut = utBotStops[k] || {};
        const lastIdx = candles.length-1;
        if(ut.buySignals?.includes(lastIdx)) buys++;
        else if(ut.sellSignals?.includes(lastIdx)) sells++;
        // Momentum simples
        const closes = candles.map(c=>c.close);
        const mom = calcMomentum(closes);
        momSum += mom; count++;
    });
    const avgMom = count>0 ? momSum/count : 50;
    const maxAgree = Math.max(buys, sells);
    const conv = count>0 ? (maxAgree/keys.length)*100 : 0;
    const h = new Date().getUTCHours();
    const sessionBonus = (h>=13 && h<20) ? 20 : (h>=7 && h<13) ? 10 : 0;
    let score = Math.min(100, Math.abs(avgMom-50)*1.5 + conv*0.5 + sessionBonus);
    document.getElementById('bmScore').textContent = score.toFixed(0)+'%';
    document.getElementById('bmGauge').style.width = score+'%';
    let color = 'var(--muted)';
    if(score>=75) { color = 'var(--accent)'; document.getElementById('bmText').textContent='🔥 ÓTIMO'; }
    else if(score>=50) { color = 'var(--warning)'; document.getElementById('bmText').textContent='⚡ BOM'; }
    else if(score>=30) { color = 'var(--muted)'; document.getElementById('bmText').textContent='⚠ AGUARDAR'; }
    else { color = 'var(--danger)'; document.getElementById('bmText').textContent='🚫 NÃO OPERAR'; }
    document.getElementById('bmText').style.color = color;
    document.getElementById('bmText').style.borderColor = color;
    document.getElementById('bmGauge').style.background = color;
    document.getElementById('bmBuy').textContent = buys;
    document.getElementById('bmSell').textContent = sells;
    document.getElementById('bmAvgMom').textContent = avgMom.toFixed(0)+'%';
    document.getElementById('bmConv').textContent = conv.toFixed(0)+'%';
    document.getElementById('bmSess').textContent = (h>=13 && h<20)?'NY':(h>=7 && h<13)?'Londres':'Ásia';
}

function calcMomentum(data) {
    if(data.length < 10) return 50;
    const recent = data.slice(-5), older = data.slice(-10,-5);
    const chg = (avg(recent)-avg(older))/avg(older)*100;
    return Math.min(100, Math.max(0, 50 + chg*10));
}
function avg(a) { return a.reduce((s,v)=>s+v,0)/a.length; }

// ========== CONSTRUÇÃO DINÂMICA DOS CARDS ==========
function buildAssetCards() {
    const container = document.getElementById('assetsContainer');
    container.innerHTML = '';
    Object.entries(ASSETS).forEach(([key, cfg]) => {
        const div = document.createElement('div');
        div.className = 'asset-card';
        div.id = `card${capitalize(key)}`;
        div.innerHTML = `
            <div class="asset-header">
                <span class="asset-name" style="color:${cfg.color}">${cfg.label}</span>
                <span style="display:flex;align-items:center;gap:6px;">
                    <span class="data-ind" id="ind${capitalize(key)}" style="color:var(--danger)">⚫ OFFLINE</span>
                </span>
            </div>
            <div class="asset-body">
                <div class="asset-price" id="price${capitalize(key)}">---.--</div>
                <div class="signal-badge neutro ut-signal">UT: ◈ NEUTRO</div>
                <div class="ut-price" style="font-size:0.65rem;color:var(--muted);margin-bottom:4px;">Stop: ---.--</div>
                <div style="display:flex;gap:8px;font-size:0.6rem;color:var(--muted);">
                    <span>MOM: <span id="mom${capitalize(key)}">--%</span></span>
                    <span>RSI: <span id="rsi${capitalize(key)}">--</span></span>
                </div>
            </div>
            <canvas class="mini-chart" id="chart${capitalize(key)}" width="300" height="120"></canvas>
        `;
        container.appendChild(div);
    });
}

// ========== UTILITÁRIOS ==========
function capitalize(s) { return s.charAt(0).toUpperCase()+s.slice(1); }

function addSignal(assetKey, dir, price, reason) {
    const t = new Date().toLocaleTimeString();
    signalLog.unshift({ t, asset: ASSETS[assetKey].label, dir, price, reason });
    if(signalLog.length > 15) signalLog.pop();
    renderSignalLog();
}

function renderSignalLog() {
    const logEl = document.getElementById('signalLog');
    logEl.innerHTML = signalLog.map(s => `
        <div class="signal-log-item">
            <span>${s.t}</span>
            <span style="color:${s.dir.includes('COMPRA')?'var(--accent)':'var(--danger)'}">${s.dir}</span>
            <span>${s.asset}</span>
            <span style="font-size:0.6rem;color:var(--muted)">${s.reason||''}</span>
        </div>
    `).join('') || '<div style="color:var(--muted);text-align:center;padding:20px;">Nenhum sinal ainda</div>';
}

// Som & Popup
function playSound() {
    if(!soundEnabled) return;
    try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        [800,1000,1200].forEach((f,i)=>{
            const osc = ac.createOscillator();
            osc.frequency.value = f;
            osc.connect(ac.destination);
            osc.start(ac.currentTime+i*0.1);
            osc.stop(ac.currentTime+i*0.1+0.2);
        });
    } catch(e){}
}
window.testSound = () => { playSound(); popup('🔊 Som','Alerta sonoro funcionando!'); };

function popup(title, desc) {
    document.getElementById('popupTitle').textContent = title;
    document.getElementById('popupDesc').textContent = desc;
    const el = document.getElementById('popupAlert');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
}

// Alertas manuais (mantidos para retrocompatibilidade)
window.toggleAlerts = function() {
    alertsEnabled = !alertsEnabled;
    document.getElementById('alertBtn').textContent = alertsEnabled ? '🔕 DESATIVAR' : '🔔 ATIVAR';
    popup(alertsEnabled?'✅ Ativado':'ℹ️ Desativado','');
};

// Sessões
function updateSessions() {
    const h = new Date().getUTCHours();
    document.getElementById('sessAsia').classList.toggle('active', h>=0 && h<7);
    document.getElementById('sessLondon').classList.toggle('active', h>=7 && h<13);
    document.getElementById('sessNY').classList.toggle('active', h>=13 && h<20);
}

// Inicialização
function init() {
    loadCredits();
    buildAssetCards();
    updateSessions();
    setInterval(updateSessions, 60000);
    document.getElementById('soundToggle').addEventListener('change', e => soundEnabled = e.target.checked);
    popup('💡 PRONTO','Clique CONECTAR para iniciar análise profissional.');
}

init();
})();
</script>
